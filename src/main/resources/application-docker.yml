spring:
  datasource:
    url: jdbc:postgresql://checkin-db:5432/checkin_db
    driver-class-name: org.postgresql.Driver
    username: checkin
    password: checkin
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8086